<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find the Letter</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap');
        
        body { margin: 0; overflow: hidden; font-family: 'Fredoka One', cursive; background-color: #f0f8ff; user-select: none; }
        #game-area { position: relative; width: 100vw; height: 100vh; }
        
        /* HUD Styles */
        #hud { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: white; padding: 10px 30px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); text-align: center; z-index: 100; border: 4px solid #FFD700; display: none; }
        
        /* Timer Styles */
        #timer { font-family: 'Courier New', monospace; font-size: 1.5rem; color: #555; margin-top: 5px; font-weight: bold; }
        
        /* Screen Styles */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 200; color: white; }
        .hidden { display: none !important; }
        
        .letter { position: absolute; font-size: 3rem; cursor: pointer; font-weight: bold; display: flex; align-items: center; justify-content: center; width: 60px; height: 60px; }
        .letter:hover { z-index: 50; text-shadow: 0 0 10px rgba(0,0,0,0.5); }

        h1 { font-size: 4rem; color: #FFD700; text-shadow: 2px 2px #333; margin-bottom: 20px; }
        button { padding: 20px 40px; font-size: 2rem; font-family: 'Fredoka One', cursive; background-color: #28a745; color: white; border: none; border-radius: 15px; cursor: pointer; box-shadow: 0 6px #1e7e34; }
        button:active { box-shadow: 0 2px #1e7e34; transform: translateY(4px); }

        @keyframes floatAndSpin {
            0% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(0, -60px) rotate(-10deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }
    </style>
</head>
<body>

    <div id="hud">
        <div style="font-size: 2rem;">Find: <span id="target-display" style="color: #FF5733; font-size: 2.5rem;">?</span></div>
        <div id="timer">00:00:00:00</div>
    </div>

    <div id="game-area"></div>

    <div id="start-screen" class="overlay">
        <h1>Letter Hunt!</h1>
        <button onclick="startGame()">Play</button>
    </div>

    <div id="win-modal" class="overlay hidden">
        <h1>You Win! 🎉</h1>
        <p style="font-size: 2rem;">Time: <span id="final-time-display">00:00:00:00</span></p>
        <button onclick="startGame()">Play Again</button>
    </div>

    <script>
        // Game initialization

        // Global Variables
        const allChars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz";
        const colors = ['#FF5733', '#33FF57', '#3357FF', '#FF33A8', '#FFBD33', '#33FFF5'];
        let currentTarget = '';
        let startTime;
        let timerInterval;

        // --- GLOBAL FUNCTIONS ---

        function startGame() {
            console.log("Start Game Clicked");
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('win-modal').classList.add('hidden');
            document.getElementById('hud').style.display = 'block';
            
            resetGame();
        }

        function resetGame() {
            const gameArea = document.getElementById('game-area');
            gameArea.innerHTML = ''; 
            
            // Pick target
            currentTarget = allChars[Math.floor(Math.random() * allChars.length)];
            document.getElementById('target-display').textContent = currentTarget;

            // Create letters
            for (let i = 0; i < 50; i++) spawnLetter(false);
            spawnLetter(true);

            // Timer
            clearInterval(timerInterval);
            startTime = Date.now();
            timerInterval = setInterval(updateTimer, 10);
        }

        function spawnLetter(isTarget) {
            const el = document.createElement('div');
            el.classList.add('letter');
            
            if (isTarget) {
                el.innerText = currentTarget;
                el.style.zIndex = 100;
                el.onclick = handleWin; // Simple onclick is safer
            } else {
                let char = currentTarget;
                while (char === currentTarget) {
                    char = allChars[Math.floor(Math.random() * allChars.length)];
                }
                el.innerText = char;
                el.onclick = function() { this.style.opacity = '0.2'; };
            }

            // Styling
            el.style.color = colors[Math.floor(Math.random() * colors.length)];
            el.style.left = (Math.random() * 80 + 10) + 'vw';
            el.style.top = (Math.random() * 80 + 10) + 'vh';
            el.style.fontSize = (Math.random() * 3 + 2) + 'rem';
            const duration = (Math.random() * 5 + 3) + 's';
            el.style.animation = `floatAndSpin ${duration} ease-in-out infinite`;
            
            document.getElementById('game-area').appendChild(el);
        }

        function handleWin() {
            clearInterval(timerInterval);
            document.getElementById('final-time-display').innerText = document.getElementById('timer').innerText;
            document.getElementById('win-modal').classList.remove('hidden');
        }

        function updateTimer() {
            const ms = Date.now() - startTime;
            const cs = Math.floor((ms % 1000) / 10).toString().padStart(2, '0');
            const s = Math.floor((ms / 1000) % 60).toString().padStart(2, '0');
            const m = Math.floor((ms / (1000 * 60)) % 60).toString().padStart(2, '0');
            const h = Math.floor((ms / (1000 * 60 * 60)) % 24).toString().padStart(2, '0');
            document.getElementById('timer').innerText = `${h}:${m}:${s}:${cs}`;
        }
    </script>
</body>
</html>
