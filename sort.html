<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Animal Sort!</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Fredoka One', cursive;
    background: #FFF8E7;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
    touch-action: manipulation;
  }

  /* ---- START SCREEN ---- */
  #start-screen {
    position: fixed; inset: 0;
    background: linear-gradient(135deg, #FFD166, #EF476F, #06D6A0, #118AB2);
    background-size: 400% 400%;
    animation: gradientShift 8s ease infinite;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 100;
  }
  @keyframes gradientShift {
    0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}
  }
  #start-screen h1 {
    font-size: clamp(3rem, 10vw, 6rem);
    color: #fff;
    text-shadow: 4px 4px 0 rgba(0,0,0,0.15);
    margin-bottom: 0.2em;
  }
  .start-animals {
    font-size: clamp(2rem, 6vw, 4rem);
    margin-bottom: 1em;
    animation: bounce 1.5s ease infinite;
  }
  @keyframes bounce {
    0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}
  }
  #play-btn {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(1.5rem, 4vw, 2.5rem);
    padding: 0.5em 2em;
    border: none; border-radius: 50px;
    background: #fff;
    color: #EF476F;
    cursor: pointer;
    box-shadow: 0 6px 0 #d4375c, 0 8px 20px rgba(0,0,0,0.15);
    transition: transform 0.1s, box-shadow 0.1s;
  }
  #play-btn:active {
    transform: translateY(4px);
    box-shadow: 0 2px 0 #d4375c, 0 4px 10px rgba(0,0,0,0.15);
  }

  /* ---- END SCREEN ---- */
  #end-screen {
    position: fixed; inset: 0;
    background: linear-gradient(135deg, #06D6A0, #118AB2, #FFD166);
    background-size: 400% 400%;
    animation: gradientShift 8s ease infinite;
    display: none; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 100;
    text-align: center;
  }
  #end-screen h1 {
    font-size: clamp(2.5rem, 8vw, 5rem);
    color: #fff;
    text-shadow: 3px 3px 0 rgba(0,0,0,0.15);
    margin-bottom: 0.1em;
  }
  #end-score {
    font-size: clamp(1.4rem, 4vw, 2.2rem);
    color: #fff;
    margin-bottom: 0.2em;
  }
  #end-stars {
    font-size: clamp(2rem, 6vw, 4rem);
    margin-bottom: 0.6em;
  }
  #end-message {
    font-size: clamp(1.2rem, 3vw, 1.8rem);
    color: #FFF8E7;
    margin-bottom: 1em;
  }
  #replay-btn {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(1.3rem, 3.5vw, 2rem);
    padding: 0.5em 2em;
    border: none; border-radius: 50px;
    background: #fff;
    color: #06D6A0;
    cursor: pointer;
    box-shadow: 0 6px 0 #04a87d, 0 8px 20px rgba(0,0,0,0.15);
    transition: transform 0.1s, box-shadow 0.1s;
  }
  #replay-btn:active {
    transform: translateY(4px);
    box-shadow: 0 2px 0 #04a87d, 0 4px 10px rgba(0,0,0,0.15);
  }

  /* ---- GAME AREA ---- */
  #game-screen { display: none; flex-direction: column; height: 100vh; }
  #game-screen.active { display: flex; }

  /* Progress bar */
  #progress-area {
    padding: 12px 20px;
    background: #FFF0D4;
    display: flex; align-items: center; gap: 12px;
  }
  #progress-label {
    font-size: clamp(0.9rem, 2vw, 1.2rem);
    color: #7C5E2C;
    white-space: nowrap;
  }
  #progress-track {
    flex: 1; height: 22px;
    background: #F0DFC0;
    border-radius: 11px;
    overflow: hidden;
  }
  #progress-fill {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, #FFD166, #EF476F);
    border-radius: 11px;
    transition: width 0.4s ease;
  }

  /* Animal display */
  #animal-area {
    flex: 1;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    position: relative;
  }
  #animal-emoji {
    font-size: clamp(5rem, 18vw, 10rem);
    transition: transform 0.3s ease;
    line-height: 1.1;
  }
  #animal-name {
    font-size: clamp(1.6rem, 5vw, 2.8rem);
    color: #5C3D2E;
    margin-top: 0.1em;
  }
  #prompt-text {
    font-size: clamp(1rem, 2.5vw, 1.4rem);
    color: #A08060;
    margin-top: 0.4em;
  }

  /* Feedback flash overlay */
  #flash-overlay {
    position: fixed; inset: 0;
    pointer-events: none;
    opacity: 0;
    z-index: 50;
    transition: opacity 0.15s;
  }
  #flash-overlay.correct { background: rgba(6,214,160,0.3); opacity: 1; }
  #flash-overlay.wrong   { background: rgba(239,71,111,0.25); opacity: 1; }

  /* Shake animation */
  @keyframes shake {
    0%,100%{transform:translateX(0)}20%{transform:translateX(-18px)}40%{transform:translateX(18px)}60%{transform:translateX(-10px)}80%{transform:translateX(10px)}
  }
  .shake { animation: shake 0.45s ease; }

  /* Fly-away animation */
  @keyframes flyToTarget {
    0%  { transform: translate(0,0) scale(1); opacity:1; }
    100%{ transform: translate(var(--fly-x), var(--fly-y)) scale(0.35); opacity:0.3; }
  }
  .fly-away { animation: flyToTarget 0.55s ease-in forwards; }

  /* ---- HABITAT ZONES ---- */
  #habitats {
    display: flex;
    height: clamp(130px, 22vh, 200px);
    gap: 0;
  }
  .habitat {
    flex: 1;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: filter 0.15s, transform 0.15s;
    border-top: 4px solid rgba(255,255,255,0.5);
  }
  .habitat:hover { filter: brightness(1.08); transform: scale(1.02); z-index: 2; }
  .habitat:active { transform: scale(0.97); opacity: 0.75; }

  /* Sky */
  #zone-sky {
    background: linear-gradient(180deg, #87CEEB 0%, #B8E4F9 100%);
  }
  /* Water */
  #zone-water {
    background: linear-gradient(180deg, #2196F3 0%, #0D47A1 100%);
  }
  /* Land */
  #zone-land {
    background: linear-gradient(180deg, #66BB6A 0%, #388E3C 100%);
  }

  .habitat-deco {
    position: absolute;
    font-size: clamp(1.4rem, 3vw, 2.2rem);
    opacity: 0.55;
    pointer-events: none;
  }
  .habitat-label {
    font-size: clamp(1.4rem, 3.5vw, 2rem);
    color: #fff;
    text-shadow: 2px 2px 0 rgba(0,0,0,0.2);
    z-index: 1;
  }
  .habitat-icon {
    font-size: clamp(2rem, 5vw, 3rem);
    z-index: 1;
    margin-bottom: 2px;
  }

  /* Decorations inside habitats */
  #zone-sky .cloud1 { top:10%; left:8%; }
  #zone-sky .cloud2 { top:25%; right:12%; }
  #zone-sky .cloud3 { bottom:18%; left:30%; }

  #zone-water .wave1 { top:12%; left:5%; }
  #zone-water .wave2 { bottom:20%; right:8%; }
  #zone-water .wave3 { top:40%; left:45%; }

  #zone-land .tree1 { top:8%; left:10%; }
  #zone-land .tree2 { bottom:10%; right:10%; }
  #zone-land .tree3 { top:30%; right:30%; }

  .hidden { display: none !important; }
</style>
</head>
<body>

<!-- START SCREEN -->
<div id="start-screen">
  <h1>Animal Sort!</h1>
  <div class="start-animals">🦁 🐟 🦅 🐘 🐬 🦋</div>
  <button id="play-btn">PLAY</button>
</div>

<!-- END SCREEN -->
<div id="end-screen">
  <h1>Great Job!</h1>
  <div id="end-stars"></div>
  <div id="end-score"></div>
  <div id="end-message"></div>
  <button id="replay-btn">Play Again</button>
</div>

<!-- FLASH OVERLAY -->
<div id="flash-overlay"></div>

<!-- GAME SCREEN -->
<div id="game-screen">
  <div id="progress-area">
    <span id="progress-label">1 / 15</span>
    <div id="progress-track"><div id="progress-fill"></div></div>
  </div>

  <div id="animal-area">
    <div id="animal-emoji"></div>
    <div id="animal-name"></div>
    <div id="prompt-text">Where does this animal live?</div>
  </div>

  <div id="habitats">
    <div class="habitat" id="zone-sky" data-habitat="sky">
      <span class="habitat-deco cloud1">&#9729;</span>
      <span class="habitat-deco cloud2">&#9729;</span>
      <span class="habitat-deco cloud3">&#9729;</span>
      <span class="habitat-icon">&#9729;&#65039;</span>
      <span class="habitat-label">Sky</span>
    </div>
    <div class="habitat" id="zone-water" data-habitat="water">
      <span class="habitat-deco wave1">&#127754;</span>
      <span class="habitat-deco wave2">&#127754;</span>
      <span class="habitat-deco wave3">&#127754;</span>
      <span class="habitat-icon">&#127754;</span>
      <span class="habitat-label">Water</span>
    </div>
    <div class="habitat" id="zone-land" data-habitat="land">
      <span class="habitat-deco tree1">&#127794;</span>
      <span class="habitat-deco tree2">&#127795;</span>
      <span class="habitat-deco tree3">&#127793;</span>
      <span class="habitat-icon">&#127795;</span>
      <span class="habitat-label">Land</span>
    </div>
  </div>
</div>

<script>
(function () {
  'use strict';

  var TOTAL_ROUNDS = 15;

  var ANIMALS = [
    { name: 'Eagle',     emoji: '\u{1F985}', habitat: 'sky' },
    { name: 'Parrot',    emoji: '\u{1F99C}', habitat: 'sky' },
    { name: 'Bat',       emoji: '\u{1F987}', habitat: 'sky' },
    { name: 'Owl',       emoji: '\u{1F989}', habitat: 'sky' },
    { name: 'Butterfly', emoji: '\u{1F98B}', habitat: 'sky' },
    { name: 'Bee',       emoji: '\u{1F41D}', habitat: 'sky' },
    { name: 'Fish',      emoji: '\u{1F41F}', habitat: 'water' },
    { name: 'Whale',     emoji: '\u{1F40B}', habitat: 'water' },
    { name: 'Dolphin',   emoji: '\u{1F42C}', habitat: 'water' },
    { name: 'Octopus',   emoji: '\u{1F419}', habitat: 'water' },
    { name: 'Shark',     emoji: '\u{1F988}', habitat: 'water' },
    { name: 'Turtle',    emoji: '\u{1F422}', habitat: 'water' },
    { name: 'Lion',      emoji: '\u{1F981}', habitat: 'land' },
    { name: 'Elephant',  emoji: '\u{1F418}', habitat: 'land' },
    { name: 'Bear',      emoji: '\u{1F43B}', habitat: 'land' },
    { name: 'Rabbit',    emoji: '\u{1F430}', habitat: 'land' },
    { name: 'Dog',       emoji: '\u{1F436}', habitat: 'land' },
    { name: 'Cat',       emoji: '\u{1F431}', habitat: 'land' },
    { name: 'Monkey',    emoji: '\u{1F435}', habitat: 'land' },
    { name: 'Horse',     emoji: '\u{1F434}', habitat: 'land' }
  ];

  /* DOM refs */
  var startScreen   = document.getElementById('start-screen');
  var endScreen     = document.getElementById('end-screen');
  var gameScreen    = document.getElementById('game-screen');
  var playBtn       = document.getElementById('play-btn');
  var replayBtn     = document.getElementById('replay-btn');
  var progressLabel = document.getElementById('progress-label');
  var progressFill  = document.getElementById('progress-fill');
  var animalEmoji   = document.getElementById('animal-emoji');
  var animalName    = document.getElementById('animal-name');
  var flashOverlay  = document.getElementById('flash-overlay');
  var endScore      = document.getElementById('end-score');
  var endStars      = document.getElementById('end-stars');
  var endMessage    = document.getElementById('end-message');
  var habitats      = document.querySelectorAll('.habitat');

  /* Audio context for sound effects */
  var audioCtx = null;
  function getAudioCtx() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    return audioCtx;
  }

  function playCorrectSound() {
    try {
      var ctx = getAudioCtx();
      var osc = ctx.createOscillator();
      var gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(523, ctx.currentTime);
      osc.frequency.setValueAtTime(659, ctx.currentTime + 0.1);
      osc.frequency.setValueAtTime(784, ctx.currentTime + 0.2);
      gain.gain.setValueAtTime(0.3, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.4);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.4);
    } catch (e) { /* silent fail */ }
  }

  function playWrongSound() {
    try {
      var ctx = getAudioCtx();
      var osc = ctx.createOscillator();
      var gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = 'square';
      osc.frequency.setValueAtTime(200, ctx.currentTime);
      osc.frequency.setValueAtTime(150, ctx.currentTime + 0.15);
      gain.gain.setValueAtTime(0.2, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.3);
    } catch (e) { /* silent fail */ }
  }

  /* Game state */
  var roundAnimals = [];
  var currentRound = 0;
  var score = 0;
  var firstTryThisRound = true;
  var inputLocked = false;

  function shuffle(arr) {
    var a = arr.slice();
    for (var i = a.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
    }
    return a;
  }

  function pickRoundAnimals() {
    var shuffled = shuffle(ANIMALS);
    return shuffled.slice(0, TOTAL_ROUNDS);
  }

  function updateProgress() {
    progressLabel.textContent = (currentRound + 1) + ' / ' + TOTAL_ROUNDS;
    progressFill.style.width = ((currentRound + 1) / TOTAL_ROUNDS * 100) + '%';
  }

  function showAnimal() {
    var animal = roundAnimals[currentRound];
    animalEmoji.textContent = animal.emoji;
    animalName.textContent = animal.name;
    animalEmoji.className = '';
    firstTryThisRound = true;
    inputLocked = false;
    updateProgress();
  }

  function flashScreen(type) {
    flashOverlay.className = type;
    setTimeout(function () { flashOverlay.className = ''; }, 350);
  }

  function flyAnimalToHabitat(habitatEl, callback) {
    var emojiRect = animalEmoji.getBoundingClientRect();
    var targetRect = habitatEl.getBoundingClientRect();
    var dx = (targetRect.left + targetRect.width / 2) - (emojiRect.left + emojiRect.width / 2);
    var dy = (targetRect.top + targetRect.height / 2) - (emojiRect.top + emojiRect.height / 2);
    animalEmoji.style.setProperty('--fly-x', dx + 'px');
    animalEmoji.style.setProperty('--fly-y', dy + 'px');
    animalEmoji.classList.add('fly-away');
    setTimeout(callback, 550);
  }

  function handleChoice(chosenHabitat, habitatEl) {
    if (inputLocked) return;
    var animal = roundAnimals[currentRound];

    if (chosenHabitat === animal.habitat) {
      /* Correct */
      inputLocked = true;
      if (firstTryThisRound) score++;
      playCorrectSound();
      flashScreen('correct');
      flyAnimalToHabitat(habitatEl, function () {
        currentRound++;
        if (currentRound >= TOTAL_ROUNDS) {
          showEnd();
        } else {
          showAnimal();
        }
      });
    } else {
      /* Wrong */
      firstTryThisRound = false;
      playWrongSound();
      flashScreen('wrong');
      animalEmoji.classList.remove('shake');
      /* Force reflow to restart animation */
      void animalEmoji.offsetWidth;
      animalEmoji.classList.add('shake');
    }
  }

  function showEnd() {
    gameScreen.classList.remove('active');
    endScreen.style.display = 'flex';

    endScore.textContent = score + ' out of ' + TOTAL_ROUNDS + ' correct on first try!';

    var starCount = 0;
    if (score >= 13) starCount = 3;
    else if (score >= 9) starCount = 2;
    else if (score >= 5) starCount = 1;

    var starsText = '';
    for (var i = 0; i < 3; i++) {
      starsText += (i < starCount) ? '\u2B50' : '\u2606';
    }
    endStars.textContent = starsText;

    var messages = [
      'Keep practicing!',
      'Nice work!',
      'Great job!',
      'Amazing! You are an animal expert!'
    ];
    endMessage.textContent = messages[starCount];
  }

  function startGame() {
    roundAnimals = pickRoundAnimals();
    currentRound = 0;
    score = 0;
    inputLocked = false;

    startScreen.style.display = 'none';
    endScreen.style.display = 'none';
    gameScreen.classList.add('active');

    showAnimal();
  }

  /* Event listeners */
  playBtn.addEventListener('click', startGame);
  replayBtn.addEventListener('click', startGame);

  for (var i = 0; i < habitats.length; i++) {
    (function (hab) {
      hab.addEventListener('click', function () {
        handleChoice(hab.getAttribute('data-habitat'), hab);
      });
    })(habitats[i]);
  }
})();
</script>
</body>
</html>
