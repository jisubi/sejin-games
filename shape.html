<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shape Matcher!</title>
    <style>
        :root {
            --bg-color: #f0f9ff;
            --primary-color: #4cc9f0;
            --success-color: #4caf50;
        }

        body {
            font-family: 'Comic Sans MS', cursive, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            overflow: hidden;
            touch-action: manipulation;
        }

        h1 { color: #333; margin-top: 20px; font-size: 2.5rem; }

        #game-container {
            display: flex;
            justify-content: space-around;
            width: 90%;
            max-width: 800px;
            margin-top: 30px;
            gap: 50px;
        }

        .column {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .item {
            width: 100px;
            height: 100px;
            background: white;
            border: 4px solid #ddd;
            border-radius: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-size: 50px;
            transition: transform 0.2s, border-color 0.2s;
            user-select: none;
        }

        .item.selected {
            border-color: var(--primary-color);
            transform: scale(1.1);
            box-shadow: 0 0 15px rgba(76, 201, 240, 0.5);
        }

        .item.matched {
            visibility: hidden;
            pointer-events: none;
        }

        /* Confetti Effect */
        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            background-color: #f00;
            top: -10px;
            z-index: 100;
            border-radius: 50%;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }

        #message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 5rem;
            font-weight: bold;
            color: var(--success-color);
            display: none;
            z-index: 200;
            text-shadow: 3px 3px 0px white;
        }
    </style>
</head>
<body>

    <h1>Match the Shapes!</h1>
    <div id="game-container">
        <div class="column" id="shapes-column"></div>
        <div class="column" id="objects-column"></div>
    </div>
    <div id="message">YAY! 🎉</div>

    <script>
        const dataPool = [
            { shape: '⭕', object: '⚽', name: 'circle' },
            { shape: '⬛', object: '📦', name: 'square' },
            { shape: '🔺', object: '🍕', name: 'triangle' },
            { shape: '⭐', object: '🌟', name: 'star' },
            { shape: '💎', object: '🪁', name: 'diamond' },
            { shape: '🟡', object: '🍋', name: 'circle' },
            { shape: '🟧', object: '🧱', name: 'square' },
            { shape: '📐', object: '⛺', name: 'triangle' },
            { shape: '🌙', object: '🍌', name: 'crescent' },
            { shape: '🥚', object: '🏈', name: 'oval' }
        ];

        let selectedShape = null;
        let selectedObject = null;
        let matchesFound = 0;

        function initGame() {
            const containerS = document.getElementById('shapes-column');
            const containerO = document.getElementById('objects-column');
            containerS.innerHTML = '';
            containerO.innerHTML = '';
            matchesFound = 0;

            // Pick 5 random pairs
            const roundData = [...dataPool].sort(() => 0.5 - Math.random()).slice(0, 5);
            
            // Create Left Column (Shapes)
            const shapes = roundData.map(d => ({content: d.shape, id: d.name}));
            shuffle(shapes).forEach(item => {
                const div = createItem(item.content, item.id, 'shape');
                containerS.appendChild(div);
            });

            // Create Right Column (Objects)
            const objects = roundData.map(d => ({content: d.object, id: d.name}));
            shuffle(objects).forEach(item => {
                const div = createItem(item.content, item.id, 'object');
                containerO.appendChild(div);
            });
        }

        function createItem(content, id, type) {
            const div = document.createElement('div');
            div.className = 'item';
            div.innerHTML = content;
            div.dataset.id = id;
            div.onclick = () => handleSelect(div, type);
            return div;
        }

        function handleSelect(el, type) {
            if (type === 'shape') {
                document.querySelectorAll('#shapes-column .item').forEach(i => i.classList.remove('selected'));
                selectedShape = el;
            } else {
                document.querySelectorAll('#objects-column .item').forEach(i => i.classList.remove('selected'));
                selectedObject = el;
            }
            el.classList.add('selected');

            checkMatch();
        }

        function checkMatch() {
            if (selectedShape && selectedObject) {
                if (selectedShape.dataset.id === selectedObject.dataset.id) {
                    // Success!
                    celebrate();
                    selectedShape.classList.add('matched');
                    selectedObject.classList.add('matched');
                    matchesFound++;
                    
                    if (matchesFound === 5) {
                        setTimeout(() => {
                            alert("GREAT JOB! Let's play again!");
                            initGame();
                        }, 1000);
                    }
                } else {
                    // Shake effect for wrong match
                    selectedShape.classList.remove('selected');
                    selectedObject.classList.remove('selected');
                }
                selectedShape = null;
                selectedObject = null;
            }
        }

        function celebrate() {
            const msg = document.getElementById('message');
            msg.style.display = 'block';
            
            for (let i = 0; i < 50; i++) {
                createConfetti();
            }

            setTimeout(() => {
                msg.style.display = 'none';
            }, 1000);
        }

        function createConfetti() {
            const c = document.createElement('div');
            c.className = 'confetti';
            c.style.left = Math.random() * 100 + 'vw';
            c.style.backgroundColor = `hsl(${Math.random() * 360}, 100%, 50%)`;
            c.style.animationDuration = (Math.random() * 2 + 1) + 's';
            document.body.appendChild(c);
            setTimeout(() => c.remove(), 3000);
        }

        function shuffle(array) {
            return array.sort(() => Math.random() - 0.5);
        }

        initGame();
    </script>
</body>
</html>
